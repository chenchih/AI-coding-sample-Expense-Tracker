<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智選記帳 Pro</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="onGisLoaded()"></script>
</head>

<body>
  <div class="glow-bg"></div>
  
  <header class="container main-header">
    <div class="row space-between center">
      <div>
        <h1>智選記帳 <span class="badge">Pro</span></h1>
        <p class="muted">專業管理，輕鬆生活</p>
      </div>
      <div class="row gap">
        <button id="btnSignIn" class="btn primary shadow" disabled>登入 Google</button>
        <button id="btnSignOut" class="btn outline" disabled>登出</button>
      </div>
    </div>
  </header>

  <main class="container grid">
    <section class="card glass">
      <div class="card-header">
        <h2>✨ 快速記帳</h2>
      </div>
      <form id="recordForm" class="form">
        <div class="grid2">
          <label>日期 <input id="fDate" type="date" required /></label>
          <label>類型
            <select id="fType" required>
              <option value="支出">💸 支出</option>
              <option value="收入">💰 收入</option>
            </select>
          </label>
        </div>
        <div class="grid2">
          <label>分類 <select id="fCategory" required></select></label>
          <label>支付方式 <select id="fPayment" required></select></label>
        </div>
        <div class="form-group">
          <label>金額</label>
          <input id="fAmount" type="number" placeholder="0" min="0" step="1" required />
        </div>
        <div class="form-group">
          <label>說明</label>
          <input id="fDescription" type="text" placeholder="這一筆花在哪呢？" required />
        </div>
        <div class="row gap mt-20">
          <button id="btnSubmit" class="btn primary block" type="submit" disabled>新增紀錄</button>
          <button id="btnReload" class="btn outline" type="button" disabled>🔄</button>
        </div>
        <p id="status" class="status-msg"></p>
      </form>
    </section>

    <section class="card glass">
      <div class="row space-between center mb-20">
        <h2>📊 本月洞察</h2>
        <input id="monthPicker" type="month" class="month-input" disabled />
      </div>
      <div class="stats-grid">
        <div class="stat-item income">
          <span class="label">收入</span>
          <div id="sumIncome" class="value">0</div>
        </div>
        <div class="stat-item expense">
          <span class="label">支出</span>
          <div id="sumExpense" class="value">0</div>
        </div>
        <div class="stat-item balance">
          <span class="label">結餘</span>
          <div id="sumNet" class="value">0</div>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="categoryChart"></canvas>
      </div>
      <div id="categoryLegend" class="legend-container"></div>
    </section>

    <section class="card glass full">
      <div class="row space-between center mb-20">
        <h2>📝 帳務明細</h2>
        <button id="btnRefresh" class="btn outline btn-sm" disabled>重新整理</button>
      </div>
      <div class="table-container">
        <table class="custom-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>類型</th>
              <th>分類</th>
              <th class="right">金額</th>
              <th>說明</th>
              <th>支付</th>
            </tr>
          </thead>
          <tbody id="recordsTbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
